<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Dicionário Mentiroso</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%95%B5%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --paper: #e8dcb5;
    --paper-2: #f5eed3;
    --ink: #241d10;
    --ink-soft: #6e5f42;
    --accent: #2f5d54;
    --accent-strong: #1c3f38;
    --flag: #9c3b2e;
    --gold: #a97a1f;
    --line: #cbb98c;
    --shadow: rgba(36, 29, 16, 0.22);
    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "Segoe UI Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #15130f;
      --paper-2: #1e1a13;
      --ink: #ecdfc0;
      --ink-soft: #a2937a;
      --accent: #6cb8a6;
      --accent-strong: #8fd0bf;
      --flag: #d9836d;
      --gold: #d9ab52;
      --line: #3a3226;
      --shadow: rgba(0, 0, 0, 0.55);
    }
  }
  :root[data-theme="dark"] {
    --paper: #15130f;
    --paper-2: #1e1a13;
    --ink: #ecdfc0;
    --ink-soft: #a2937a;
    --accent: #6cb8a6;
    --accent-strong: #8fd0bf;
    --flag: #d9836d;
    --gold: #d9ab52;
    --line: #3a3226;
    --shadow: rgba(0, 0, 0, 0.55);
  }
  :root[data-theme="light"] {
    --paper: #e8dcb5;
    --paper-2: #f5eed3;
    --ink: #241d10;
    --ink-soft: #6e5f42;
    --accent: #2f5d54;
    --accent-strong: #1c3f38;
    --flag: #9c3b2e;
    --gold: #a97a1f;
    --line: #cbb98c;
    --shadow: rgba(36, 29, 16, 0.22);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }
  body {
    background: radial-gradient(ellipse at top, var(--paper-2), var(--paper) 70%);
    color: var(--ink);
    font-family: var(--font-mono);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 28px 14px 60px;
  }
  #app {
    width: 100%;
    max-width: 540px;
  }
  header.masthead {
    text-align: center;
    margin-bottom: 22px;
  }
  header.masthead .tab {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--paper-2);
    background: var(--ink);
    padding: 4px 14px;
    border-radius: 3px 3px 0 0;
  }
  h1.title {
    font-family: var(--font-display);
    text-align: center;
    font-size: 2.1rem;
    font-weight: 700;
    font-style: italic;
    margin: 4px 0 6px;
    text-wrap: balance;
  }
  p.subtitle {
    text-align: center;
    margin: 0 auto;
    max-width: 46ch;
    color: var(--ink-soft);
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .card {
    position: relative;
    background: var(--paper-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 22px 20px;
    box-shadow: 0 10px 22px var(--shadow);
    margin-bottom: 18px;
  }
  .card::before {
    content: attr(data-tab);
    position: absolute;
    top: -11px;
    left: 16px;
    background: var(--gold);
    color: var(--paper-2);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
  }
  .card:not([data-tab])::before { content: none; }
  .card h2 {
    font-family: var(--font-display);
    margin-top: 0;
    font-size: 1.3rem;
  }
  .card h3 {
    margin: 0 0 12px;
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
  }
  .muted { color: var(--ink-soft); }
  button {
    font-family: var(--font-mono);
    cursor: pointer;
    border: 2px solid var(--ink);
    border-radius: 3px;
    font-size: 0.92rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 14px 18px;
    width: 100%;
    background: transparent;
    color: var(--ink);
    transition: transform 0.05s ease, opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent-strong);
    color: var(--paper-2);
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent-strong); }
  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border-color: var(--line);
    margin-top: 10px;
  }
  .btn-danger {
    background: transparent;
    color: var(--flag);
    border-color: var(--flag);
    margin-top: 10px;
  }
  input[type="text"], textarea {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 0.95rem;
    padding: 12px 14px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
  }
  textarea { min-height: 90px; }
  .player-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .player-row input { flex: 1; }
  .player-row button {
    width: auto;
    padding: 10px 14px;
    color: var(--flag);
    border-color: var(--line);
  }
  .add-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .add-row input { flex: 1; }
  .add-row button { width: auto; padding: 12px 18px; }
  .word-display {
    text-align: center;
    padding: 18px 10px 8px;
  }
  .word-display .eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .word-display .term {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 2.3rem;
    font-weight: 700;
    color: var(--accent);
    word-break: break-word;
  }
  .turn-banner {
    text-align: center;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 18px;
  }
  .turn-banner .eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .turn-banner .who {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink);
  }
  .pass-note {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.85rem;
    margin-top: 4px;
    line-height: 1.5;
  }
  .def-option {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 14px;
    margin-bottom: 10px;
    font-size: 0.92rem;
    font-weight: 400;
    text-transform: none;
    letter-spacing: normal;
    color: var(--ink);
  }
  .def-option:hover:not(:disabled) {
    border-color: var(--accent);
  }
  .def-option.own {
    opacity: 0.55;
  }
  .reveal-item {
    border-radius: 3px;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--line);
    background: var(--paper);
  }
  .reveal-item.real {
    border-color: var(--accent);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .reveal-item .meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 8px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    display: inline-block;
    background: var(--accent);
    color: var(--paper-2);
    border-radius: 2px;
    padding: 2px 8px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 2px;
    border-bottom: 1px solid var(--line);
    font-size: 0.95rem;
  }
  .score-row:last-child { border-bottom: none; }
  .score-row .name { font-weight: 600; }
  .score-row .pts {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }
  .score-row.leader .name::after {
    content: " ★";
    color: var(--gold);
  }
  .progress {
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .error-msg {
    color: var(--flag);
    font-size: 0.85rem;
    margin: -4px 0 12px;
  }
  .bonus-note {
    text-align: center;
    font-weight: 700;
    color: var(--accent);
    border-top: 1px dashed var(--line);
    padding-top: 12px;
    margin-top: 4px;
    font-size: 0.88rem;
  }
  .footer-note {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.75rem;
    margin-top: 20px;
  }
  .rule {
    border: none;
    border-top: 1px dashed var(--line);
    margin: 14px 0;
  }
</style>
</head>
<body>
<div id="app">
  <header class="masthead">
    <span class="tab">Dossiê de investigação lexical</span>
    <h1 class="title">Dicionário Mentiroso</h1>
    <p class="subtitle">Uma palavra rara, um bando de testemunhas pouco confiáveis e uma única definição verdadeira escondida no meio das mentiras.</p>
  </header>
  <div id="screen"></div>
  <p class="footer-note">Passe o dispositivo entre os jogadores quando for solicitado.</p>
</div>

<script>
(function () {
  "use strict";

  // ---------- Dictionary ----------
  var DICTIONARY = [
    { term: "Lacônico", definition: "Que fala pouco; conciso e breve na expressão." },
    { term: "Ígneo", definition: "Relativo ao fogo; que tem origem vulcânica, como as rochas ígneas." },
    { term: "Quimera", definition: "Sonho ou desejo impossível de se realizar; ilusão." },
    { term: "Pletora", definition: "Excesso ou grande quantidade de alguma coisa." },
    { term: "Profícuo", definition: "Que traz proveito; vantajoso, útil." },
    { term: "Sicrano", definition: "Pessoa indeterminada ou não identificada, citada ao lado de fulano e beltrano." },
    { term: "Chocalho", definition: "Objeto que produz som ao ser agitado, usado por animais ou como brinquedo de bebê." },
    { term: "Idiossincrasia", definition: "Modo de ser, de reagir ou de pensar próprio e peculiar de uma pessoa." },
    { term: "Efêmero", definition: "Que dura muito pouco tempo; passageiro, fugaz." },
    { term: "Alcunha", definition: "Apelido pelo qual uma pessoa é conhecida, além do seu nome verdadeiro." },
    { term: "Sagaz", definition: "Que percebe e compreende as coisas com facilidade; esperto, astuto." },
    { term: "Perene", definition: "Que dura por muito tempo, sem interrupção; contínuo, permanente." },
    { term: "Deletério", definition: "Que causa dano à saúde ou à vida; nocivo, prejudicial." },
    { term: "Cerne", definition: "Parte central e mais importante de algo; a essência de uma questão." },
    { term: "Tergiversar", definition: "Usar de rodeios e evasivas; mudar de opinião por conveniência." },
    { term: "Ojeriza", definition: "Antipatia ou aversão sentida em relação a alguém ou algo." },
    { term: "Diáfano", definition: "Transparente; que deixa passar a luz quase por completo." },
    { term: "Impávido", definition: "Que não demonstra medo diante do perigo; destemido, corajoso." },
    { term: "Prosaico", definition: "Comum e sem originalidade; relativo ao cotidiano, sem encanto poético." },
    { term: "Ubíquo", definition: "Que está ou parece estar presente em todos os lugares ao mesmo tempo." },
    { term: "Escrupuloso", definition: "Que age com extremo cuidado e honestidade; muito criterioso." },
    { term: "Volúvel", definition: "Que muda de opinião ou de sentimento com facilidade; inconstante." },
    { term: "Perspicaz", definition: "Que percebe as coisas com rapidez e agudeza de raciocínio." },
    { term: "Nefasto", definition: "Que causa grande dano ou desgraça; funesto, de mau agouro." },
    { term: "Hodierno", definition: "Relativo aos dias de hoje; atual, dos tempos presentes." },
    { term: "Anacrônico", definition: "Que está fora do seu tempo; que não condiz com a época atual." },
    { term: "Displicente", definition: "Que demonstra desinteresse, desatenção ou desprezo por algo." },
    { term: "Cizânia", definition: "Discórdia ou desentendimento semeado propositalmente entre pessoas." },
    { term: "Concomitante", definition: "Que ocorre ao mesmo tempo que outra coisa; simultâneo." },
    { term: "Beócio", definition: "Diz-se de pessoa considerada ignorante, grosseira ou de raciocínio lento." },
    { term: "Falacioso", definition: "Enganoso; que contém erro proposital para iludir alguém." },
    { term: "Ledo", definition: "Alegre, contente; termo de uso literário para felicidade." },
    { term: "Circunlóquio", definition: "Modo indireto e prolixo de dizer algo, usando muitas palavras em rodeio." },
    { term: "Sinuoso", definition: "Que apresenta curvas; tortuoso, não retilíneo." },
    { term: "Marasmo", definition: "Estado de apatia, estagnação e falta de vigor ou de movimento." },
    { term: "Excrescência", definition: "Protuberância ou crescimento anormal; algo supérfluo e indesejado." },
    { term: "Cognato", definition: "Diz-se de palavra que tem a mesma origem ou raiz de outra." },
    { term: "Estultice", definition: "Falta de bom senso; tolice, estupidez." },
    { term: "Pusilânime", definition: "Que tem pouca coragem; medroso, covarde diante das dificuldades." },
    { term: "Comezinho", definition: "Simples, fácil, corriqueiro; sem grande importância." },
    { term: "Diatribe", definition: "Discurso ou escrito violento e cheio de críticas contra alguém ou algo." },
    { term: "Improbidade", definition: "Falta de honestidade e caráter; desonestidade, má-fé." },
    { term: "Perfunctório", definition: "Feito de modo superficial, sem cuidado ou empenho." },
    { term: "Recôndito", definition: "Escondido, oculto; de difícil acesso ou compreensão." },
    { term: "Vetusto", definition: "Muito antigo; que tem grande idade, velho." },
    { term: "Adrede", definition: "De propósito, de forma planejada; intencionalmente." },
    { term: "Bonomia", definition: "Qualidade de quem é bondoso e simples no trato com os outros." },
    { term: "Cônscio", definition: "Que tem plena consciência ou conhecimento de algo." },
    { term: "Espúrio", definition: "Que não é genuíno ou legítimo; falso, adulterado." },
    { term: "Frugal", definition: "Que se contenta com pouco; simples e moderado, especialmente na alimentação." }
  ];

  // ---------- State ----------
  var state = {
    phase: "setup",
    players: [],
    usedTerms: [],
    currentDrawer: 0,
    round: 0,
    currentWord: null,
    writeQueue: [],
    submissions: [],
    voteQueue: [],
    votes: {},
    lastScoring: null
  };

  var screenEl = document.getElementById("screen");

  function render() {
    if (state.phase === "setup") renderSetup();
    else if (state.phase === "round-start") renderRoundStart();
    else if (state.phase === "writing") renderWriting();
    else if (state.phase === "voting") renderVoting();
    else if (state.phase === "reveal") renderReveal();
    else if (state.phase === "final") renderFinal();
  }

  function el(html) {
    var d = document.createElement("div");
    d.innerHTML = html;
    return d;
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function escapeHtml(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  // ---------- Setup screen ----------
  function renderSetup() {
    var rowsHtml = state.players.map(function (p, i) {
      return (
        '<div class="player-row">' +
          '<input type="text" value="' + escapeHtml(p.name) + '" data-idx="' + i + '" class="player-name-input">' +
          '<button data-idx="' + i + '" class="remove-player">✕</button>' +
        '</div>'
      );
    }).join("");

    var card = el(
      '<div class="card" data-tab="Suspeitos">' +
        '<h3>Jogadores</h3>' +
        '<div id="playersList">' + rowsHtml + '</div>' +
        '<div class="add-row">' +
          '<input type="text" id="newPlayerInput" placeholder="Nome do jogador">' +
          '<button class="btn-secondary" id="addPlayerBtn" style="width:auto;">Adicionar</button>' +
        '</div>' +
        (state.players.length < 3 ? '<p class="error-msg">Adicione pelo menos 3 jogadores para uma boa votação.</p>' : '') +
        '<button class="btn-primary" id="startGameBtn" ' + (state.players.length < 3 ? "disabled" : "") + '>Abrir o caso</button>' +
      '</div>' +
      '<div class="card" data-tab="Regras do interrogatório">' +
        '<h3>Como jogar</h3>' +
        '<p style="font-size:0.88rem; line-height:1.6;">' +
          '1. Sorteie uma palavra rara do dicionário.<br>' +
          '2. Cada jogador, exceto quem sorteou, escreve um depoimento: uma definição inventada, tentando soar verdadeira.<br>' +
          '3. Todos votam em qual depoimento acham que é a definição real.<br>' +
          '4. Quem <b>engana</b> outro jogador (recebe voto na sua definição falsa) e quem <b>identifica</b> a definição real ganham pontos.<br>' +
          '5. Se ninguém descobrir a definição real, quem sorteou a palavra leva um bônus por ter escondido bem o rastro.' +
        '</p>' +
      '</div>'
    );

    screenEl.innerHTML = "";
    screenEl.appendChild(card);

    document.querySelectorAll(".player-name-input").forEach(function (inp) {
      inp.addEventListener("input", function () {
        state.players[parseInt(inp.dataset.idx, 10)].name = inp.value;
      });
    });
    document.querySelectorAll(".remove-player").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.players.splice(parseInt(btn.dataset.idx, 10), 1);
        render();
      });
    });
    document.getElementById("addPlayerBtn").addEventListener("click", addPlayerFromInput);
    document.getElementById("newPlayerInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); addPlayerFromInput(); }
    });
    var startBtn = document.getElementById("startGameBtn");
    if (startBtn) startBtn.addEventListener("click", startGame);
  }

  function addPlayerFromInput() {
    var inp = document.getElementById("newPlayerInput");
    var name = inp.value.trim();
    if (!name) return;
    state.players.push({ name: name, score: 0 });
    render();
  }

  function startGame() {
    if (state.players.length < 3) return;
    state.currentDrawer = 0;
    state.round = 1;
    state.usedTerms = [];
    state.phase = "round-start";
    render();
  }

  // ---------- Round start ----------
  function renderRoundStart() {
    var drawer = state.players[state.currentDrawer];
    var card = el(
      '<div class="turn-banner">' +
        '<div class="eyebrow">Dossiê nº ' + state.round + '</div>' +
        '<div class="who">' + escapeHtml(drawer.name) + '</div>' +
        '<div class="muted">está com o arquivo. É quem vai sortear a palavra.</div>' +
      '</div>' +
      '<div class="card" style="text-align:center;">' +
        '<p class="pass-note">Passe o dispositivo para <b>' + escapeHtml(drawer.name) + '</b> e abra o arquivo.</p>' +
        '<button class="btn-primary" id="drawWordBtn">Sortear palavra</button>' +
      '</div>'
    );
    screenEl.innerHTML = "";
    screenEl.appendChild(card);
    document.getElementById("drawWordBtn").addEventListener("click", drawWord);
  }

  function drawWord() {
    var available = DICTIONARY.filter(function (w) { return state.usedTerms.indexOf(w.term) === -1; });
    if (available.length === 0) {
      state.usedTerms = [];
      available = DICTIONARY.slice();
    }
    var word = available[Math.floor(Math.random() * available.length)];
    state.usedTerms.push(word.term);
    state.currentWord = word;

    state.writeQueue = state.players
      .map(function (p, i) { return i; })
      .filter(function (i) { return i !== state.currentDrawer; });
    state.submissions = [];
    state.phase = "writing";
    render();
  }

  // ---------- Writing phase ----------
  function renderWriting() {
    if (state.writeQueue.length === 0) {
      // move to voting
      state.submissions.push({ playerIndex: null, text: state.currentWord.definition, isReal: true });
      state.submissions = shuffle(state.submissions);
      state.voteQueue = state.players
        .map(function (p, i) { return i; })
        .filter(function (i) { return i !== state.currentDrawer; });
      state.votes = {};
      state.phase = "voting";
      render();
      return;
    }

    var playerIdx = state.writeQueue[0];
    var player = state.players[playerIdx];
    var remaining = state.writeQueue.length;

    var card = el(
      '<div class="word-display card">' +
        '<div class="eyebrow">Palavra sob investigação</div>' +
        '<div class="term">' + escapeHtml(state.currentWord.term) + '</div>' +
      '</div>' +
      '<div class="card" data-tab="Depoimento">' +
        '<p class="progress">Faltam ' + remaining + ' testemunho(s)</p>' +
        '<h3>Vez de: ' + escapeHtml(player.name) + '</h3>' +
        '<p class="pass-note" style="margin-bottom:12px;">Escreva um depoimento convincente para essa palavra, mesmo que seja pura invenção.</p>' +
        '<textarea id="defInput" placeholder="Digite aqui a sua definição falsa..."></textarea>' +
        '<p class="error-msg" id="writeError" style="display:none;">Escreva algo antes de confirmar.</p>' +
        '<button class="btn-primary" id="submitDefBtn" style="margin-top:12px;">Registrar depoimento</button>' +
      '</div>'
    );
    screenEl.innerHTML = "";
    screenEl.appendChild(card);

    document.getElementById("submitDefBtn").addEventListener("click", function () {
      var val = document.getElementById("defInput").value.trim();
      if (!val) {
        document.getElementById("writeError").style.display = "block";
        return;
      }
      state.submissions.push({ playerIndex: playerIdx, text: val, isReal: false });
      state.writeQueue.shift();
      render();
    });
  }

  // ---------- Voting phase ----------
  function renderVoting() {
    if (state.voteQueue.length === 0) {
      finishVotingAndScore();
      return;
    }
    var voterIdx = state.voteQueue[0];
    var voter = state.players[voterIdx];
    var remaining = state.voteQueue.length;

    var optionsHtml = state.submissions.map(function (sub, i) {
      var isOwn = sub.playerIndex === voterIdx;
      return (
        '<button class="def-option' + (isOwn ? " own" : "") + '" data-idx="' + i + '" ' + (isOwn ? "disabled" : "") + '>' +
          escapeHtml(sub.text) + (isOwn ? ' <span class="muted">(seu depoimento)</span>' : '') +
        '</button>'
      );
    }).join("");

    var card = el(
      '<div class="word-display card">' +
        '<div class="eyebrow">Palavra sob investigação</div>' +
        '<div class="term">' + escapeHtml(state.currentWord.term) + '</div>' +
      '</div>' +
      '<div class="card" data-tab="Veredito">' +
        '<p class="progress">Faltam ' + remaining + ' voto(s)</p>' +
        '<h3>Vez de: ' + escapeHtml(voter.name) + '</h3>' +
        '<p class="pass-note" style="margin-bottom:12px;">Qual depoimento você acha que é a definição real?</p>' +
        '<div id="optionsWrap">' + optionsHtml + '</div>' +
      '</div>'
    );
    screenEl.innerHTML = "";
    screenEl.appendChild(card);

    document.querySelectorAll("#optionsWrap .def-option").forEach(function (btn) {
      if (btn.disabled) return;
      btn.addEventListener("click", function () {
        var subIdx = parseInt(btn.dataset.idx, 10);
        state.votes[voterIdx] = subIdx;
        state.voteQueue.shift();
        render();
      });
    });
  }

  function finishVotingAndScore() {
    // count votes per submission
    var voteCounts = state.submissions.map(function () { return 0; });
    Object.keys(state.votes).forEach(function (voterIdxStr) {
      var subIdx = state.votes[voterIdxStr];
      voteCounts[subIdx]++;
    });

    var deltas = {}; // playerIndex -> points gained this round
    state.players.forEach(function (p, i) { deltas[i] = 0; });

    var realSubIdx = -1;
    state.submissions.forEach(function (sub, i) {
      if (sub.isReal) realSubIdx = i;
      else if (voteCounts[i] > 0) {
        deltas[sub.playerIndex] += voteCounts[i]; // 1 point per vote fooled
      }
    });

    // voters who correctly picked the real definition
    Object.keys(state.votes).forEach(function (voterIdxStr) {
      var voterIdx = parseInt(voterIdxStr, 10);
      var subIdx = state.votes[voterIdxStr];
      if (subIdx === realSubIdx) {
        deltas[voterIdx] += 2;
      }
    });

    // bonus for drawer if nobody found the real definition
    var noOneFoundReal = realSubIdx !== -1 && voteCounts[realSubIdx] === 0;
    if (noOneFoundReal) {
      deltas[state.currentDrawer] += 3;
    }

    Object.keys(deltas).forEach(function (idxStr) {
      state.players[parseInt(idxStr, 10)].score += deltas[idxStr];
    });

    state.lastScoring = {
      voteCounts: voteCounts,
      realSubIdx: realSubIdx,
      deltas: deltas,
      noOneFoundReal: noOneFoundReal
    };
    state.phase = "reveal";
    render();
  }

  // ---------- Reveal phase ----------
  function renderReveal() {
    var scoring = state.lastScoring;
    var itemsHtml = state.submissions.map(function (sub, i) {
      var count = scoring.voteCounts[i];
      var authorName = sub.isReal ? "Definição verdadeira do dicionário" : escapeHtml(state.players[sub.playerIndex].name);
      return (
        '<div class="reveal-item' + (sub.isReal ? " real" : "") + '">' +
          '<div>' + escapeHtml(sub.text) + '</div>' +
          '<div class="meta">' +
            '<span>' + (sub.isReal ? '<span class="tag">Verdadeiro</span> ' : 'Depoente: ') + (sub.isReal ? '' : authorName) + '</span>' +
            '<span>' + count + ' voto(s)</span>' +
          '</div>' +
        '</div>'
      );
    }).join("");

    var drawerName = state.players[state.currentDrawer].name;
    var bonusHtml = scoring.noOneFoundReal
      ? '<p class="bonus-note">Ninguém identificou a definição real. ' + escapeHtml(drawerName) + ' ganha +3 pontos de bônus por enganar a todos.</p>'
      : "";

    var deltaRows = state.players.map(function (p, i) {
      var d = state.lastScoring.deltas[i];
      return '<div class="score-row"><span class="name">' + escapeHtml(p.name) + '</span><span class="pts">' + (d > 0 ? "+" + d : "0") + '</span></div>';
    }).join("");

    var card = el(
      '<div class="card" data-tab="Resultado">' +
        '<h3>Resultado da rodada</h3>' +
        '<div class="word-display" style="padding-top:0;">' +
          '<div class="term" style="font-size:1.7rem;">' + escapeHtml(state.currentWord.term) + '</div>' +
        '</div>' +
        itemsHtml +
        bonusHtml +
      '</div>' +
      '<div class="card">' +
        '<h3>Pontos ganhos nesta rodada</h3>' +
        deltaRows +
      '</div>' +
      '<div class="card" data-tab="Placar">' +
        '<h3>Placar geral</h3>' +
        '<div id="scoreboard"></div>' +
        '<button class="btn-primary" id="nextRoundBtn" style="margin-top:14px;">Próxima rodada</button>' +
        '<button class="btn-danger" id="endGameBtn">Encerrar jogo</button>' +
      '</div>'
    );
    screenEl.innerHTML = "";
    screenEl.appendChild(card);
    renderScoreboardInto(document.getElementById("scoreboard"));

    document.getElementById("nextRoundBtn").addEventListener("click", function () {
      state.currentDrawer = (state.currentDrawer + 1) % state.players.length;
      state.round++;
      state.phase = "round-start";
      render();
    });
    document.getElementById("endGameBtn").addEventListener("click", function () {
      state.phase = "final";
      render();
    });
  }

  function renderScoreboardInto(container) {
    var sorted = state.players.slice().sort(function (a, b) { return b.score - a.score; });
    var maxScore = sorted.length ? sorted[0].score : 0;
    container.innerHTML = sorted.map(function (p) {
      var isLeader = p.score === maxScore && maxScore > 0;
      return (
        '<div class="score-row' + (isLeader ? " leader" : "") + '">' +
          '<span class="name">' + escapeHtml(p.name) + '</span>' +
          '<span class="pts">' + p.score + '</span>' +
        '</div>'
      );
    }).join("");
  }

  // ---------- Final screen ----------
  function renderFinal() {
    var sorted = state.players.slice().sort(function (a, b) { return b.score - a.score; });
    var winner = sorted[0];
    var card = el(
      '<div class="card" style="text-align:center;" data-tab="Caso encerrado">' +
        '<h2>Caso encerrado</h2>' +
        '<p style="font-size:1.15rem; font-weight:700; color:var(--accent);">' + escapeHtml(winner.name) + ' venceu!</p>' +
        '<div id="scoreboardFinal" style="margin-top:12px;"></div>' +
        '<button class="btn-primary" id="playAgainBtn" style="margin-top:16px;">Abrir novo caso</button>' +
      '</div>'
    );
    screenEl.innerHTML = "";
    screenEl.appendChild(card);
    renderScoreboardInto(document.getElementById("scoreboardFinal"));
    document.getElementById("playAgainBtn").addEventListener("click", function () {
      state.players.forEach(function (p) { p.score = 0; });
      state.usedTerms = [];
      state.round = 0;
      state.phase = "setup";
      render();
    });
  }

  // ---------- Init ----------
  state.players = [
    { name: "Jogador 1", score: 0 },
    { name: "Jogador 2", score: 0 },
    { name: "Jogador 3", score: 0 }
  ];
  render();
})();
</script>
</body>
</html>
